<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contatti - StreamHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/config.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body>
  <header class="navbar">
    <a class="logo" href="index.html">StreamHub</a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="live.html">Live</a>
      <a href="community.html">Community</a>
      <a href="plans.html">Abbonamenti</a>
      <a href="contact.html">Contatti</a>
    </nav>
  </header>

  <main class="page">
    <h1>Contatti</h1>
    <p class="subtitle">Hai domande, collaborazioni o problemi? Scrivici.</p>

    <section class="contact-box">
      <form action="mailto:tuamail@example.com" method="post" enctype="text/plain">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Il tuo nome" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="La tua email" required>

        <label>Messaggio</label>
        <textarea name="messaggio" rows="6" placeholder="Scrivi qui..." required></textarea>

        <button class="btn primary" type="submit">Invia messaggio</button>
      </form>

      <div class="contact-info">
        <h2>Info server</h2>
        <p>Email: tuamail@example.com</p>
        <p>Discord: link modificabile in config.js</p>
        <p>Twitch: link modificabile in config.js</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> StreamHub.</p>
  </footer>
</body>
</html>
